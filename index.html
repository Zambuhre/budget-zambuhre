<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Zambuhre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0e11;
  --bg2: #13151a;
  --bg3: #1a1d24;
  --bg4: #22262f;
  --border: #2a2e38;
  --gold: #c9a84c;
  --gold2: #e8c96a;
  --gold-dim: rgba(201,168,76,0.12);
  --text: #e8e4dc;
  --text2: #9a9591;
  --text3: #5a5650;
  --green: #4caf82;
  --red: #c9504c;
  --blue: #4c82c9;
  --purple: #9b59b6;
  --orange: #e8904c;
  --radius: 10px;
  --shadow: 0 2px 16px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
}
h1,h2,h3 { font-family: 'DM Serif Display', serif; font-weight: 400; }

/* NAV */
.nav {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 0;
  position: sticky; top: 0; z-index: 100;
}
.nav-brand {
  font-family: 'DM Serif Display', serif;
  font-size: 1.2rem;
  color: var(--gold);
  letter-spacing: 0.02em;
  padding: 16px 20px 16px 0;
  border-right: 1px solid var(--border);
  margin-right: 8px;
  white-space: nowrap;
}
.nav-tabs { display: flex; gap: 2px; flex: 1; overflow-x: auto; }
.nav-tab {
  padding: 16px 14px;
  background: none; border: none; border-bottom: 2px solid transparent;
  color: var(--text2); font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem; font-weight: 500; letter-spacing: 0.05em;
  text-transform: uppercase; cursor: pointer; white-space: nowrap;
  transition: all 0.15s;
}
.nav-tab:hover { color: var(--text); }
.nav-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
.nav-month {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 0 8px 16px;
  border-left: 1px solid var(--border);
  margin-left: 8px;
}
.nav-month button {
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2); width: 28px; height: 28px; border-radius: 6px;
  cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.nav-month button:hover { color: var(--gold); border-color: var(--gold); }
.nav-month .month-label {
  font-weight: 600; font-size: 0.85rem; color: var(--text); min-width: 90px; text-align: center;
}

/* MAIN */
.main { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }

/* CARDS */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
}
.card-title {
  font-family: 'DM Serif Display', serif;
  font-size: 1rem;
  color: var(--text2);
  margin-bottom: 16px;
  letter-spacing: 0.02em;
}

/* GRID */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }

/* KPI */
.kpi-val {
  font-family: 'DM Serif Display', serif;
  font-size: 1.7rem;
  color: var(--text);
  line-height: 1;
}
.kpi-val.pos { color: var(--green); }
.kpi-val.neg { color: var(--red); }
.kpi-label { font-size: 0.75rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-top: 4px; }
.kpi-sub { font-size: 0.8rem; color: var(--text2); margin-top: 4px; }

/* SECTION HEADERS */
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.section-title {
  font-family: 'DM Serif Display', serif;
  font-size: 1.2rem;
  color: var(--text);
}

/* BUTTONS */
.btn {
  padding: 7px 14px; border-radius: 7px; border: none;
  font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 600;
  cursor: pointer; transition: all 0.15s; letter-spacing: 0.03em;
}
.btn-gold { background: var(--gold); color: #000; }
.btn-gold:hover { background: var(--gold2); }
.btn-ghost { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); }
.btn-ghost:hover { color: var(--text); border-color: var(--text3); }
.btn-danger { background: rgba(201,80,76,0.15); border: 1px solid rgba(201,80,76,0.3); color: var(--red); }
.btn-danger:hover { background: rgba(201,80,76,0.25); }
.btn-sm { padding: 4px 10px; font-size: 0.75rem; }
.btn-icon { padding: 5px 8px; }

/* FORM */
.form-row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
.form-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 120px; }
.form-group label { font-size: 0.75rem; color: var(--text2); letter-spacing: 0.04em; text-transform: uppercase; }
input, select, textarea {
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text); border-radius: 7px; padding: 8px 10px;
  font-family: 'DM Sans', sans-serif; font-size: 0.88rem;
  transition: border-color 0.15s; width: 100%;
}
input:focus, select:focus, textarea:focus {
  outline: none; border-color: var(--gold);
}
input[type="number"] { -moz-appearance: textfield; }
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
select option { background: var(--bg3); }

/* TABLE */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
th {
  text-align: left; padding: 10px 12px;
  color: var(--text3); font-size: 0.72rem;
  text-transform: uppercase; letter-spacing: 0.07em; font-weight: 600;
  border-bottom: 1px solid var(--border);
}
td { padding: 9px 12px; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
tr:hover td { background: var(--bg3); }
tr:last-child td { border-bottom: none; }
.td-right { text-align: right; }
.amount-pos { color: var(--green); font-weight: 500; }
.amount-neg { color: var(--red); font-weight: 500; }

/* BADGE */
.badge {
  display: inline-block; padding: 2px 8px; border-radius: 20px;
  font-size: 0.72rem; font-weight: 600; letter-spacing: 0.04em;
}
.badge-albin { background: rgba(76,130,201,0.2); color: #7ab3e8; }
.badge-diana { background: rgba(155,89,182,0.2); color: #c49be8; }
.badge-gemensam { background: rgba(201,168,76,0.15); color: var(--gold); }

/* PROGRESS BAR */
.prog-wrap { background: var(--bg3); border-radius: 4px; height: 6px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
.prog-fill.green { background: var(--green); }
.prog-fill.orange { background: var(--orange); }
.prog-fill.red { background: var(--red); }
.prog-fill.gold { background: var(--gold); }

/* ALERT */
.alert {
  padding: 10px 16px; border-radius: 8px;
  font-size: 0.82rem; margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.alert-gold { background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.25); color: var(--gold2); }
.alert-red { background: rgba(201,80,76,0.1); border: 1px solid rgba(201,80,76,0.25); color: #e88a88; }
.alert-green { background: rgba(76,175,130,0.1); border: 1px solid rgba(76,175,130,0.25); color: #7acfa9; }

/* DIVIDER */
.divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

/* TABS within page */
.inner-tabs { display: flex; gap: 4px; margin-bottom: 16px; }
.inner-tab {
  padding: 6px 14px; border-radius: 7px;
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2); font-size: 0.78rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; transition: all 0.15s;
}
.inner-tab.active { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; padding: 20px;
}
.modal {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 14px; padding: 28px; width: 100%; max-width: 560px;
  max-height: 90vh; overflow-y: auto;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6);
}
.modal-title {
  font-family: 'DM Serif Display', serif;
  font-size: 1.3rem; margin-bottom: 20px; color: var(--text);
}
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

/* COLOR DOT */
.dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

/* CATEGORY ROW */
.cat-row { display: grid; grid-template-columns: 1fr 120px 100px 100px 80px; gap: 8px; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
.cat-row:last-child { border-bottom: none; }
.cat-name { font-size: 0.85rem; color: var(--text); }
.cat-budget-input { width: 100%; }

/* GOAL CARD */
.goal-card {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px;
}
.goal-name { font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; }
.goal-amounts { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text2); margin-bottom: 8px; }

/* TOOLTIP */
.info { color: var(--text3); cursor: help; font-size: 0.75rem; margin-left: 4px; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* SICK/VAB PANEL */
.absence-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.absence-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
.absence-label { font-size: 0.72rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.absence-val { font-size: 1.1rem; font-weight: 600; color: var(--red); }
.absence-val.yellow { color: var(--orange); }
.absence-val.green { color: var(--green); }

/* ANNUAL VIEW */
.annual-row { display: grid; grid-template-columns: 80px repeat(12, 1fr); gap: 2px; font-size: 0.72rem; margin-bottom: 2px; align-items: center; }
.annual-cell { text-align: right; padding: 5px 4px; border-radius: 3px; }
.annual-cell.header { color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
.annual-cell.pos { color: var(--green); }
.annual-cell.neg { color: var(--red); }
.annual-cell.highlight { background: var(--gold-dim); color: var(--gold); }

/* ANALYSIS CHART */
.bar-chart { display: flex; flex-direction: column; gap: 8px; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-label { font-size: 0.78rem; color: var(--text2); min-width: 130px; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-track { flex: 1; background: var(--bg3); border-radius: 3px; height: 20px; position: relative; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
.bar-val { font-size: 0.75rem; color: var(--text2); min-width: 65px; text-align: right; white-space: nowrap; }

@media (max-width: 768px) {
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  .cat-row { grid-template-columns: 1fr 90px 80px; }
}

/* SYNC INDICATOR */
.sync-dot {
  width: 8px; height: 8px; border-radius: 50%;
  display: inline-block; margin-right: 6px; flex-shrink: 0;
}
.sync-dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
.sync-dot.orange { background: var(--orange); animation: pulse 1s infinite; }
.sync-dot.red { background: var(--red); }
.sync-dot.grey { background: var(--text3); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.sync-status {
  display: flex; align-items: center; padding: 6px 12px;
  border-left: 1px solid var(--border); margin-left: 8px;
  font-size: 0.72rem; color: var(--text3); white-space: nowrap; cursor: pointer;
  transition: color 0.15s;
}
.sync-status:hover { color: var(--text2); }
</style>
</head>

// Config stored in localStorage (device-local, never synced)
const SYNC_CFG_KEY = 'bz_sync_cfg';
let syncCfg = { binId: '', apiKey: '', enabled: false };
let syncState = 'unconfigured'; // unconfigured | syncing | ok | error
let saveDebounceTimer = null;
let pollTimer = null;
let lastRemoteVersion = null;
let isSaving = false;

function loadSyncCfg() {
  try {
    const d = localStorage.getItem(SYNC_CFG_KEY);
    if (d) syncCfg = JSON.parse(d);
  } catch(e) {}
}

function saveSyncCfg() {
  try { localStorage.setItem(SYNC_CFG_KEY, JSON.stringify(syncCfg)); } catch(e) {}
}

function setSyncStatus(status, text) {
  syncState = status;
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  if (!dot || !txt) return;
  dot.className = 'sync-dot';
  if (status === 'ok') { dot.classList.add('green'); txt.textContent = text || 'Synkad'; }
  else if (status === 'syncing') { dot.classList.add('orange'); txt.textContent = text || 'Synkar…'; }
  else if (status === 'error') { dot.classList.add('red'); txt.textContent = text || 'Synkfel'; }
  else { dot.classList.add('grey'); txt.textContent = text || 'Ej konfigurerad'; }
}

// Serialize only data (not UI state like currentMonth/Year)
function serializeData() {
  const { transactions, income, fixedCosts, budgets, goals,
          plannedExpenses, recurringTx, settings, absences, customCategories, removedCategories } = state;
  return { transactions, income, fixedCosts, budgets, goals,
           plannedExpenses, recurringTx, settings, absences, customCategories, removedCategories,
           _lastSaved: new Date().toISOString() };
}

function mergeRemoteData(remote) {
  const keys = ['transactions','income','fixedCosts','budgets','goals',
                 'plannedExpenses','recurringTx','settings','absences','customCategories','removedCategories'];
  keys.forEach(k => { if (remote[k] !== undefined) state[k] = remote[k]; });
  initDefaults();
}

// Save to JSONBin (debounced 1.5s)
function save() {
  // Always write to localStorage as fallback
  try { localStorage.setItem('bz_v2', JSON.stringify(state)); } catch(e) {}

  if (!syncCfg.enabled || !syncCfg.binId || !syncCfg.apiKey) return;

  clearTimeout(saveDebounceTimer);
  saveDebounceTimer = setTimeout(pushToCloud, 1500);
}

async function pushToCloud() {
  if (isSaving) return;
  isSaving = true;
  setSyncStatus('syncing', 'Sparar…');
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${syncCfg.binId}`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': syncCfg.apiKey,
        'X-Bin-Versioning': 'false'
      },
      body: JSON.stringify(serializeData())
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    lastRemoteVersion = json.metadata?.version;
    setSyncStatus('ok', 'Synkad ✓');
  } catch(e) {
    setSyncStatus('error', 'Synkfel – försöker igen');
    console.error('Push failed:', e);
  } finally {
    isSaving = false;
  }
}

async function pullFromCloud(silent) {
  if (!syncCfg.enabled || !syncCfg.binId || !syncCfg.apiKey) return;
  if (!silent) setSyncStatus('syncing', 'Hämtar…');
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${syncCfg.binId}/latest`, {
      headers: { 'X-Master-Key': syncCfg.apiKey }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    const remote = json.record;
    // Only apply if actually different (avoid clobbering mid-edit)
    const remoteVer = json.metadata?.version;
    if (remoteVer !== lastRemoteVersion || !lastRemoteVersion) {
      lastRemoteVersion = remoteVer;
      mergeRemoteData(remote);
      try { localStorage.setItem('bz_v2', JSON.stringify(state)); } catch(e) {}
      render();
    }
    setSyncStatus('ok', 'Synkad ✓');
  } catch(e) {
    setSyncStatus('error', 'Hämtningsfel');
    console.error('Pull failed:', e);
  }
}

function startPolling() {
  clearInterval(pollTimer);
  if (!syncCfg.enabled) return;
  // Poll every 30 seconds
  pollTimer = setInterval(() => pullFromCloud(true), 30000);
}

async function initSync() {
  loadSyncCfg();
  if (!syncCfg.enabled || !syncCfg.binId || !syncCfg.apiKey) {
    setSyncStatus('unconfigured', 'Ej konfigurerad');
    return;
  }
  setSyncStatus('syncing', 'Ansluter…');
  await pullFromCloud(false);
  startPolling();
}

async function createNewBin(apiKey) {
  // Creates a new JSONBin bin and returns the bin ID
  setSyncStatus('syncing', 'Skapar databas…');
  try {
    const res = await fetch('https://api.jsonbin.io/v3/b', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': apiKey,
        'X-Bin-Name': 'budget-zambuhre',
        'X-Bin-Private': 'true'
      },
      body: JSON.stringify(serializeData())
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
    const json = await res.json();
    return json.metadata?.id || null;
  } catch(e) {
    setSyncStatus('error', 'Kunde inte skapa databas');
    throw e;
  }
}

function fmtKey(y, m) { return `${y}-${String(m+1).padStart(2,'0')}`; }

// Skattetabell 31 lookup
function lookupTax31(grossAmount) {
  const g = Math.round(grossAmount);
  for (const [from, to, tax] of TABELL31) {
    if (g >= from && g <= to) return tax;
  }
  // Above table max: ~9816 + ~20% statlig (approx)
  return Math.round(9816 + (g - 48000) * 0.5);
}

// Gross → Net calculator with kostförmån
function calcNet(gross, kostformanDays, mealType) {
  if (!gross || gross <= 0) return { net: 0, tax: 0, forman: 0 };
  // Kostförmån: skattepliktig del added to gross for tax calculation
  const dailyForman = mealType === 'lunch' ? KOSTFORMAN_SKATTEPLIKTIG : 0;
  const monthlyForman = dailyForman * (kostformanDays || 0);
  const taxableGross = gross + monthlyForman;
  const tax = lookupTax31(taxableGross);
  // Net = gross - tax (employee doesn't "receive" the förmån, they pay the kostavdrag from net)
  const kostavdragTotal = KOSTFORMAN_KOSTAVDRAG * (kostformanDays || 0);
  const net = gross - tax - kostavdragTotal;
  return { net: Math.round(net), tax, forman: monthlyForman, kostavdrag: kostavdragTotal };
}

// Absence impact on salary
// Visita semestertillägg: 400 kr per paid vacation day (on top of regular salary)
const SEMESTERTILLAGG_PER_DAY = 400;

function calcAbsenceImpact(grossMonthly, absences, sgi) {
  const { vab, sickKarens, sickPay, parent, vacation, unpaidVacation } = absences;
  const workDays = state.settings.workDaysPerMonth;
  const dailyGross = grossMonthly / workDays;
  let totalDeduction = 0;
  let totalFK = 0;
  let semesterBonus = 0;

  // Paid vacation (semester): keep full daily pay + semestertillägg 400 kr/day (Visita)
  if (vacation > 0) {
    semesterBonus = vacation * SEMESTERTILLAGG_PER_DAY;
  }

  // Unpaid vacation: lose full day gross, no replacement
  if (unpaidVacation > 0) {
    totalDeduction += dailyGross * unpaidVacation;
  }

  // Karensdag: full day lost, no replacement
  if (sickKarens > 0) {
    totalDeduction += dailyGross * sickKarens;
  }
  // Sjuklön (dag 2–14): arbetsgivaren betalar 80%, du förlorar 20%
  if (sickPay > 0) {
    const employerDays = Math.min(sickPay, 13);
    totalDeduction += dailyGross * employerDays * (1 - SICK_EMPLOYER_RATE);
    const fkDays = Math.max(sickPay - 13, 0); // dag 15+ = FK sjukpenning
    if (fkDays > 0) {
      const dailySGI = sgi / 365;
      totalFK += Math.min(dailySGI * SJUKPENNING_RATE, MAX_SGI_DAILY * SJUKPENNING_RATE) * fkDays;
      totalDeduction += dailyGross * fkDays;
    }
  }

  // VAB: lose day pay, get FK benefit
  if (vab > 0) {
    totalDeduction += dailyGross * vab;
    const dailySGI = sgi / 365;
    totalFK += Math.min(dailySGI * VAB_RATE, MAX_SGI_DAILY * VAB_RATE) * vab;
  }

  // Föräldraledighet
  if (parent > 0) {
    totalDeduction += dailyGross * parent;
    const dailySGI = sgi / 365;
    totalFK += Math.min(dailySGI * 0.775, MAX_SGI_DAILY * 0.775) * parent;
  }

  return { deduction: Math.round(totalDeduction), fk: Math.round(totalFK), semesterBonus: Math.round(semesterBonus) };
}

// Get transactions for display month (accounting for CC billing cycles)
function getDisplayTransactions(y, m) {
  return state.transactions.filter(tx => {
    const d = new Date(tx.date);
    if (!tx.ccType) {
      // cash / debit: show in actual month
      return d.getFullYear() === y && d.getMonth() === m;
    }
    // CC: shift to effective month
    const effDate = getCCEffectiveMonth(tx.date, tx.ccType);
    return effDate.year === y && effDate.month === m;
  });
}

function getCCEffectiveMonth(dateStr, ccType) {
  const d = new Date(dateStr);
  const day = d.getDate();
  const month = d.getMonth();
  const year = d.getFullYear();
  const settings = ccType === 'Albin' ? state.settings.albinCC : state.settings.dianaCC;
  const closeDay = settings.closeDay;
  if (day > closeDay) {
    // After close → next month
    if (month === 11) return { year: year+1, month: 0 };
    return { year, month: month+1 };
  }
  return { year, month };
}

function getTotalIncome(y, m) {
  const rows = getMonthIncome(y, m);
  const abs = getAbsences(y, m);
  let total = 0;
  rows.forEach(r => {
    if (r.useGross) {
      // If manual net override is set, use that directly
      if (r.manualNet && r.manualNet > 0) {
        total += r.manualNet;
        return;
      }
      const absP = r.person === 'Albin' ? abs.albin : (r.person === 'Diana' ? abs.diana : { vab:0, sick:0, parent:0, vacation:0, unpaidVacation:0 });
      const sgi = r.person === 'Albin' ? state.settings.albinSGI : state.settings.dianaSGI;
      const impact = calcAbsenceImpact(r.gross || r.amount, absP, sgi);
      const { net } = calcNet(r.gross || r.amount, r.kostformanDays, r.mealType);
      total += net - impact.deduction + impact.fk + impact.semesterBonus;
    } else {
      total += r.amount || 0;
    }
  });
  return Math.round(total);
}

function getTotalFixed(y, m) {

  return Object.values(getSpentByCategory(y, m)).reduce((s, v) => s + v, 0);
}

function getAbsences(y, m) {
  const key = fmtKey(y, m);
  if (!state.absences[key]) return {
    albin: {vab:0,sickKarens:0,sickPay:0,parent:0,vacation:0,unpaidVacation:0},
    diana: {vab:0,sickKarens:0,sickPay:0,parent:0,vacation:0,unpaidVacation:0}
  };
  // Backfill missing fields
  const a = state.absences[key];
  if (!a.albin.vacation) a.albin.vacation = 0;
  if (!a.albin.unpaidVacation) a.albin.unpaidVacation = 0;
  if (!a.albin.sickKarens) a.albin.sickKarens = 0;
  if (!a.albin.sickPay) a.albin.sickPay = 0;
  if (!a.diana.vacation) a.diana.vacation = 0;
  if (!a.diana.unpaidVacation) a.diana.unpaidVacation = 0;
  if (!a.diana.sickKarens) a.diana.sickKarens = 0;
  if (!a.diana.sickPay) a.diana.sickPay = 0;
  return a;
}

// CC pending amount (transactions entered this month but effective next month)
function getCCPending(y, m) {
  const d = new Date(y, m, 1);
  let total = 0;
  state.transactions.forEach(tx => {
    if (!tx.ccType) return;
    const txDate = new Date(tx.date);
    if (txDate.getFullYear() !== y || txDate.getMonth() !== m) return;
    const eff = getCCEffectiveMonth(tx.date, tx.ccType);
    if (eff.year !== y || eff.month !== m) total += tx.amount;
  });
  return total;
}

// Buffer from settings
function getBuffer() {
  return state.settings.bufferCurrent || 100000;
}
function getBufferTarget() {
  return state.settings.bufferTarget || 150000;
}

// ============================================================
// TAB ROUTING
// ============================================================
let activeTab = 'overview';
function showTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => {
    if (t.getAttribute('onclick') === `showTab('${tab}')`) t.classList.add('active');
  });
  render();
}

function changeMonth(delta) {
  state.currentMonth += delta;
  if (state.currentMonth > 11) { state.currentMonth = 0; state.currentYear++; }
  if (state.currentMonth < 0) { state.currentMonth = 11; state.currentYear--; }
  render();
}

// ============================================================
// RENDER DISPATCH
// ============================================================
function render() {
  const y = state.currentYear, m = state.currentMonth;
  document.getElementById('monthLabel').textContent = `${MONTHS_SV[m]} ${y}`;
  const c = document.getElementById('mainContent');
  switch(activeTab) {
    case 'overview':
      c.innerHTML = renderOverview(y, m);
      // Draw donuts after DOM is set
      const _sp = getSpentByCategory(y, m);
      const _ti = getTotalIncome(y, m), _tf = getTotalFixed(y, m), _tfx = getTotalFlexible(y, m);
      drawDonut('donutBudget', [
        { value: _tf, color: '#5a5e68' },
        { value: _tfx, color: '#e8904c' },
        { value: Math.max(0, _ti - _tf - _tfx), color: '#4caf82' },
      ]);
      const catEntries = Object.entries(_sp).sort((a,b)=>b[1]-a[1]).slice(0,6);
      drawDonut('donutCats', catEntries.map(([cat, amt]) => ({ value: amt, color: getCatColor(cat) })));
      break;
    case 'transactions': c.innerHTML = renderTransactions(y, m); break;
    case 'income': c.innerHTML = renderIncome(y, m); break;
    case 'fixed': c.innerHTML = renderFixed(y, m); break;
    case 'categories': c.innerHTML = renderCategories(y, m); break;
    case 'goals': c.innerHTML = renderGoals(); break;
    case 'annual': c.innerHTML = renderAnnual(); break;
    case 'analysis': c.innerHTML = renderAnalysis(y, m); break;
    case 'settings': c.innerHTML = renderSettings(); break;
  }
}

function renderAbsenceSummary(person, abs, y, m) {

  if (!income) return '';
  const sgi = person === 'Albin' ? state.settings.albinSGI : state.settings.dianaSGI;
  const impact = calcAbsenceImpact(income.gross || income.amount, abs, sgi);
  const hasActivity = (abs.vab||0)+(abs.sick||0)+(abs.parent||0)+(abs.vacation||0)+(abs.unpaidVacation||0) > 0;
  if (!hasActivity) return '';
  return `
  <div class="absence-card">
    <div class="absence-label">${person} – denna månad</div>
    ${abs.vacation > 0 ? `<div style="color:var(--green)">Semester: ${abs.vacation} dag${abs.vacation>1?'ar':''} (+${fmtMoney(impact.semesterBonus)} tillägg)</div>` : ''}
    ${abs.unpaidVacation > 0 ? `<div style="color:var(--red)">Obetald semester: ${abs.unpaidVacation} dag${abs.unpaidVacation>1?'ar':''}</div>` : ''}
    ${abs.vab > 0 ? `<div>VAB: ${abs.vab} dag${abs.vab>1?'ar':''}</div>` : ''}
    ${abs.sick > 0 ? `<div>Sjuk: ${abs.sick} dag${abs.sick>1?'ar':''}</div>` : ''}
    ${abs.parent > 0 ? `<div>Föräldraledig: ${abs.parent} dag${abs.parent>1?'ar':''}</div>` : ''}
    ${impact.deduction > 0 ? `<div class="absence-val">−${fmtMoney(impact.deduction)}</div>` : ''}
    ${impact.semesterBonus > 0 ? `<div style="color:var(--green);font-size:0.85rem">+${fmtMoney(impact.semesterBonus)} semestertillägg</div>` : ''}
    ${impact.fk > 0 ? `<div style="color:var(--green);font-size:0.85rem">+${fmtMoney(impact.fk)} FK-ersättning</div>` : ''}
  </div>`;
}

function renderCategoryBars(spent, budgets) {
  const cats = getAllCategories().filter(c => (spent[c] || 0) > 0 || (budgets[c] || 0) > 0);
  if (cats.length === 0) return `<div style="color:var(--text3);font-size:0.85rem;padding:8px 0">Inga transaktioner denna månad. Gå till Transaktioner för att lägga till.</div>`;
  const maxVal = Math.max(...cats.map(c => Math.max(spent[c]||0, budgets[c]||0)));
  return `<div class="bar-chart">` + cats.map(c => {
    const s = spent[c] || 0;
    const b = budgets[c] || 0;
    const pct = maxVal > 0 ? (s / maxVal) * 100 : 0;
    const overBudget = b > 0 && s > b;
    const color = overBudget ? 'var(--red)' : (CAT_COLORS[c] || 'var(--gold)');
    const budgetPct = maxVal > 0 ? (b / maxVal) * 100 : 0;
    return `
    <div class="bar-row">
      <div class="bar-label" title="${c}">${c}</div>
      <div class="bar-track">
        ${b > 0 ? `<div style="position:absolute;left:0;top:0;height:100%;width:${budgetPct}%;background:rgba(255,255,255,0.06);border-right:1px dashed var(--border)"></div>` : ''}
        <div class="bar-fill" style="width:${pct}%;background:${color}"></div>
      </div>
      <div class="bar-val">
        ${fmtMoney(s)}${b > 0 ? `<span style="color:${overBudget?'var(--red)':'var(--text3)'}"> / ${fmtMoney(b)}</span>` : ''}
      </div>
    </div>`;
  }).join('') + `</div>`;
}

function renderIncomeBreakdown(y, m) {
  const rows = getMonthIncome(y, m);
  const abs = getAbsences(y, m);
  let lines = [];
  rows.forEach(r => {
    let net;
    if (r.useGross) {
      const albinAbs = r.person === 'Albin' ? abs.albin : (r.person === 'Diana' ? abs.diana : { vab:0, sick:0, parent:0 });
      const sgi = r.person === 'Albin' ? state.settings.albinSGI : state.settings.dianaSGI;
      const impact = calcAbsenceImpact(r.gross || r.amount, albinAbs, sgi);
      const { net: n } = calcNet(r.gross || r.amount, r.kostformanDays, r.mealType);
      net = n - impact.deduction + impact.fk;
    } else {
      net = r.amount;
    }
    if (net !== 0) lines.push({ label: r.label, net });
  });
  return lines.map(l => `
  <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:0.83rem">
    <span style="color:var(--text2)">${l.label}</span>
    <span style="color:var(--text);font-weight:500">${fmtMoney(l.net)}</span>
  </div>`).join('');
}

function updateBuffer(v) {

  render();
}

function saveTx(editId) {
  const date = document.getElementById('tx_date').value;
  const amount = parseNum(document.getElementById('tx_amount').value);
  const category = document.getElementById('tx_cat').value;
  const person = document.getElementById('tx_person').value;
  const ccType = document.getElementById('tx_cc').value || null;
  const description = document.getElementById('tx_desc').value;
  if (!date || !amount || !category) return;
  if (editId) {
    const idx = state.transactions.findIndex(t => t.id === editId);
    if (idx >= 0) state.transactions[idx] = { ...state.transactions[idx], date, amount, category, person, ccType, description };
  } else {
    state.transactions.push({ id: uid(), date, amount, category, person, ccType, description });
  }
  save(); closeModal(); render();
}

function deleteTx(id) {
  state.transactions = state.transactions.filter(t => t.id !== id);
  save(); render();
}

function applyRecurring(y, m) {
  const key = fmtKey(y, m);
  const existing = state.transactions.filter(t => {
    const d = new Date(t.date);
    return d.getFullYear() === y && d.getMonth() === m && t.isRecurring;
  });
  const toAdd = state.recurringTx.filter(r => !existing.some(e => e.recurringId === r.id));
  toAdd.forEach(r => {
    state.transactions.push({
      id: uid(), date: `${y}-${String(m+1).padStart(2,'0')}-${String(r.dayOfMonth).padStart(2,'0')}`,
      amount: r.amount, category: r.category, person: r.person || 'Gemensamt',
      description: r.label, ccType: null, isRecurring: true, recurringId: r.id
    });
  });
  save(); render();
}

function openRecurringModal() {
  showModal('Återkommande transaktioner', `
  <div id="recList">

    <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">

  <div class="form-row">
    <div class="form-group"><label>Namn</label><input type="text" id="rec_label" placeholder="Spotify Premium"></div>
    <div class="form-group"><label>Belopp</label><input type="number" id="rec_amount" placeholder="129"></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label>Kategori</label><select id="rec_cat">${getAllCategories().map(c=>`<option>${c}</option>`).join('')}</select></div>

  </div>

function addRecurring() {
  const label = document.getElementById('rec_label').value;
  const amount = parseNum(document.getElementById('rec_amount').value);
  const category = document.getElementById('rec_cat').value;
  const dayOfMonth = parseInt(document.getElementById('rec_day').value) || 1;
  if (!label || !amount) return;
  state.recurringTx.push({ id: uid(), label, amount, category, dayOfMonth });
  save(); closeModal(); render();
}

function deleteRecurring(id) {
  state.recurringTx = state.recurringTx.filter(r => r.id !== id);
  save(); closeModal(); render();
}

function renderIncomeRow(r, key, abs) {
  let netDisplay = '';
  if (r.useGross) {
    const person = r.person;
    const absP = person === 'Albin' ? abs.albin : (person === 'Diana' ? abs.diana : {vab:0,sick:0,parent:0,vacation:0,unpaidVacation:0});
    const sgi = person === 'Albin' ? state.settings.albinSGI : state.settings.dianaSGI;
    const impact = calcAbsenceImpact(r.gross || r.amount, absP, sgi);
    const { net, tax, forman, kostavdrag } = calcNet(r.gross || r.amount, r.kostformanDays, r.mealType);
    const autoNet = net - impact.deduction + impact.fk + impact.semesterBonus;
    const finalNet = (r.manualNet && r.manualNet > 0) ? r.manualNet : autoNet;
    const isOverridden = r.manualNet && r.manualNet > 0;
    netDisplay = `<div style="font-weight:600;color:var(--green)">${fmtMoney(finalNet)}${isOverridden?'<span style="color:var(--gold);font-size:0.7rem;margin-left:4px">✎ manuell</span>':''}</div>
      <div style="font-size:0.72rem;color:var(--text3)">Skatt: ${fmtMoney(tax)} · Kostavd: ${fmtMoney(kostavdrag)}</div>
      ${impact.semesterBonus > 0 ? `<div style="font-size:0.72rem;color:var(--green)">+${fmtMoney(impact.semesterBonus)} semestertillägg</div>` : ''}
      ${impact.deduction > 0 ? `<div style="font-size:0.72rem;color:var(--red)">Frånv: −${fmtMoney(impact.deduction)}${impact.fk>0?` +${fmtMoney(impact.fk)} FK`:''}</div>` : ''}`;
  } else {
    netDisplay = `<div style="font-weight:600;color:var(--text)">${fmtMoney(r.amount)}</div>`;
  }
  return `
  <tr>
    <td><input type="text" value="${r.label}" style="width:100%;min-width:150px" onchange="updateIncomeRow('${key}','${r.id}','label',this.value)"></td>
    <td>
      <select onchange="updateIncomeRow('${key}','${r.id}','person',this.value)">
        ${['Albin','Diana','Gemensamt'].map(p=>`<option ${r.person===p?'selected':''}>${p}</option>`).join('')}
      </select>
    </td>
    <td style="text-align:center">
      <input type="checkbox" ${r.useGross?'checked':''} onchange="updateIncomeRow('${key}','${r.id}','useGross',this.checked)">
    </td>
    <td>
      ${r.useGross ? `<input type="number" value="${r.gross || r.amount}" style="width:100px" onchange="updateIncomeRow('${key}','${r.id}','gross',this.value)">` : 
      `<input type="number" value="${r.amount}" style="width:100px" onchange="updateIncomeRow('${key}','${r.id}','amount',this.value)">`}
    </td>
    <td>
      ${r.useGross ? `<input type="number" value="${r.kostformanDays||0}" min="0" max="23" style="width:60px" onchange="updateIncomeRow('${key}','${r.id}','kostformanDays',this.value)" title="Kostförmånsdagar (Visita: du betalar 55kr/dag, schablonvärde 124kr, skattepliktig diff 69kr/dag)">` : '–'}
    </td>
    <td class="td-right">${netDisplay}</td>
    <td><button class="btn btn-danger btn-sm btn-icon" onclick="removeIncomeRow('${key}','${r.id}')">✕</button></td>
  </tr>`;
}

function renderGrossNetPanel(person, y, m, absP) {
  // Use prev month absences for calculation (matches pay date)
  const prevAbs = m === 0 ? getAbsences(y-1, 11) : getAbsences(y, m-1);
  const calcAbsP = person === 'Albin' ? prevAbs.albin : prevAbs.diana;
  const rows = getMonthIncome(y, m);
  const incRow = rows.find(r => r.person === person && r.useGross);
  if (!incRow) return `<div style="color:var(--text3)">Ingen bruttolön för ${person} denna månad.</div>`;
  const gross = incRow.gross || incRow.amount;
  const sgi = person === 'Albin' ? state.settings.albinSGI : state.settings.dianaSGI;
  const impact = calcAbsenceImpact(gross, calcAbsP, sgi);
  const { net, tax, forman, kostavdrag } = calcNet(gross, incRow.kostformanDays, incRow.mealType);
  const dailyGross = gross / (state.settings.workDaysPerMonth || 22);
  const color = person === 'Albin' ? 'var(--blue)' : 'var(--purple)';
  const autoNet = net - impact.deduction + impact.fk + impact.semesterBonus;
  const hasManual = incRow.manualNet && incRow.manualNet > 0;
  const key = fmtKey(y, m);
  return `
  <div>
    <div style="font-weight:700;color:${color};margin-bottom:12px;font-size:1rem">${person}</div>
    <div style="display:flex;flex-direction:column;gap:5px;font-size:0.83rem">
      <div style="display:flex;justify-content:space-between;padding:4px 0">
        <span style="color:var(--text2)">Bruttolön</span><span>${fmtMoney(gross)}</span>
      </div>
      ${forman > 0 ? `<div style="display:flex;justify-content:space-between;padding:4px 0;color:var(--text3)">
        <span>+ Kostförmån skattepliktig (${incRow.kostformanDays} × 69 kr)</span><span>+${fmtMoney(forman)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:4px 0;color:var(--text3)">
        <span>Skatteunderlag</span><span>${fmtMoney(gross + forman)}</span>
      </div>` : ''}
      <div style="display:flex;justify-content:space-between;padding:4px 0;color:var(--red)">
        <span>− Skatt (tabell 31)</span><span>−${fmtMoney(tax)}</span>
      </div>
      ${kostavdrag > 0 ? `<div style="display:flex;justify-content:space-between;padding:4px 0;color:var(--text3)">
        <span>− Kostavdrag (${incRow.kostformanDays} × 55 kr)</span><span>−${fmtMoney(kostavdrag)}</span>
      </div>` : ''}
      <div style="border-top:1px solid var(--border);margin:4px 0"></div>
      <div style="display:flex;justify-content:space-between;padding:4px 0;font-weight:600">
        <span>Nettolön (beräknad)</span><span style="color:var(--green)">${fmtMoney(net)}</span>
      </div>
      ${impact.semesterBonus > 0 ? `<div style="display:flex;justify-content:space-between;padding:4px 0;color:var(--green)">
        <span>+ Semestertillägg (${absP.vacation} dag × 400 kr, Visita)</span><span>+${fmtMoney(impact.semesterBonus)}</span>
      </div>` : ''}
      ${impact.deduction > 0 || impact.fk > 0 ? `
      <div style="border-top:1px solid var(--border);margin:4px 0"></div>
      <div style="color:var(--text3);font-size:0.78rem;margin-bottom:4px">Frånvaropåverkan:</div>
      ${absP.unpaidVacation > 0 ? `<div style="display:flex;justify-content:space-between;color:var(--red)">
        <span>− Obetald semester (${absP.unpaidVacation} dag)</span><span>−${fmtMoney(Math.round((gross/(state.settings.workDaysPerMonth||22))*absP.unpaidVacation))}</span>
      </div>` : ''}
      ${impact.deduction > 0 ? `<div style="display:flex;justify-content:space-between;color:var(--red)">
        <span>− Frånvaroavdrag (sjuk/VAB/FL)</span><span>−${fmtMoney(impact.deduction)}</span>
      </div>` : ''}
      ${impact.fk > 0 ? `<div style="display:flex;justify-content:space-between;color:var(--green)">
        <span>+ FK-ersättning</span><span>+${fmtMoney(impact.fk)}</span>
      </div>` : ''}` : ''}
      <div style="border-top:1px solid var(--border);margin:4px 0"></div>
      <div style="display:flex;justify-content:space-between;font-weight:700;font-size:0.95rem">
        <span>Beräknad utbetalning</span>
        <span style="color:${hasManual?'var(--text3)':'var(--green)'};${hasManual?'text-decoration:line-through':''}">${fmtMoney(autoNet)}</span>
      </div>
      ${hasManual ? `<div style="display:flex;justify-content:space-between;font-weight:700;font-size:1rem;margin-top:4px">
        <span>Faktisk utbetalning (lönespec)</span><span style="color:var(--green)">${fmtMoney(incRow.manualNet)}</span>
      </div>` : ''}

      <!-- Manual override -->
      <div style="margin-top:10px;padding:10px;background:var(--bg3);border-radius:8px;border:1px solid var(--border)">
        <div style="font-size:0.75rem;color:var(--text3);margin-bottom:6px">
          💡 Stämmer inte beräkningen? Ange faktisk nettoutbetalning per lönespecifikation:
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="number" placeholder="Lämna tomt för beräknat värde"
            value="${incRow.manualNet || ''}"
            style="flex:1"
            onchange="updateIncomeRow('${key}','${incRow.id}','manualNet',this.value ? parseFloat(this.value) : 0)">
          ${hasManual ? `<button class="btn btn-ghost btn-sm" onclick="updateIncomeRow('${key}','${incRow.id}','manualNet',0)">✕ Nollställ</button>` : ''}
        </div>
      </div>

      <div style="margin-top:8px;padding:8px;background:var(--bg3);border-radius:6px;font-size:0.78rem;color:var(--text3)">
        Dagslön: ${fmtMoney(Math.round(dailyGross))} · Effektiv skatt: ${Math.round((tax/(gross+forman))*100)}% · Kostavdrag/mån: ${fmtMoney(kostavdrag)}
      </div>
    </div>
  </div>`;
}

function updateIncomeRow(key, id, field, value) {
  if (!state.income[key]) state.income[key] = getMonthIncome(state.currentYear, state.currentMonth);
  const idx = state.income[key].findIndex(r => r.id === id);
  if (idx < 0) return;
  if (field === 'gross' || field === 'amount' || field === 'kostformanDays') value = parseNum(value);
  if (field === 'useGross') value = !!value;
  state.income[key][idx][field] = value;
  if (field === 'gross') state.income[key][idx].amount = parseNum(value);
  save(); render();
}

function removeIncomeRow(key, id) {
  if (state.income[key]) state.income[key] = state.income[key].filter(r => r.id !== id);
  save(); render();
}

function addIncomeRow(key) {
  if (!state.income[key]) state.income[key] = getMonthIncome(state.currentYear, state.currentMonth);
  state.income[key].push({ id: uid(), label: 'Ny inkomst', amount: 0, gross: 0, person: 'Gemensamt', useGross: false, kostformanDays: 0, mealType: 'none' });
  save(); render();
}

function updateAbsence(key, person, field, value) {
  if (!state.absences[key]) state.absences[key] = { albin:{vab:0,sick:0,parent:0}, diana:{vab:0,sick:0,parent:0} };
  state.absences[key][person][field] = parseInt(value) || 0;
  save(); render();
}

function renderFixed(y, m) {

  return `
<div style="display:flex;flex-direction:column;gap:16px">
  <div class="section-header">
    <div class="section-title">Fasta kostnader – ${MONTHS_SV[m]} ${y}</div>
    <span style="font-weight:700;font-size:1.1rem;color:var(--text)">${fmtMoney(total)}</span>
  </div>
  ${groups.map(g => {
    const gRows = rows.filter(r => r.group === g);
    const gTotal = gRows.reduce((s,r) => s+(r.amount||0), 0);

    <div class="card">
      <div class="section-header">
        <div class="card-title">${g}</div>
        <div style="display:flex;gap:8px;align-items:center">
          <span style="font-weight:600;color:var(--text2)">${fmtMoney(gTotal)}</span>
          <button class="btn btn-ghost btn-sm" onclick="addFixedRow('${key}','${g}')">+ Rad</button>
        </div>

      <div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04)">
        <input type="text" value="${r.label}" style="flex:1" onchange="updateFixed('${key}','${r.id}','label',this.value)">
        <input type="number" value="${r.amount||0}" style="width:110px;text-align:right" onchange="updateFixed('${key}','${r.id}','amount',this.value)">
        <span style="font-size:0.78rem;color:var(--text3);min-width:20px">kr</span>
        <button class="btn btn-danger btn-sm btn-icon" onclick="removeFixed('${key}','${r.id}')">✕</button>
      </div>`).join('')}

  }).join('')}
  ${kostavdrag > 0 ? `
  <div class="card" style="border-color:rgba(201,168,76,0.2)">

    <div style="display:flex;align-items:center;gap:10px;padding:6px 0">
      <span style="flex:1;color:var(--text2);font-size:0.85rem">Kostavdrag måltider (55 kr × kostförmånsdagar) – Visita/Unionen</span>
      <span style="width:110px;text-align:right;font-weight:600;color:var(--gold)">${fmtMoney(kostavdrag)}</span>
      <span style="font-size:0.78rem;color:var(--text3);min-width:20px">kr</span>
      <span style="width:60px"></span>
    </div>
    <div style="font-size:0.75rem;color:var(--text3)">Baserat på kostförmånsdagar inmatade under Inkomster. Ändra där för att justera.</div>
  </div>` : ''}
</div>`;
}

function updateFixed(key, id, field, value) {
  if (!state.fixedCosts[key]) return;
  const idx = state.fixedCosts[key].findIndex(r => r.id === id);
  if (idx < 0) return;
  state.fixedCosts[key][idx][field] = field === 'amount' ? parseNum(value) : value;
  save(); render();
}

function removeFixed(key, id) {
  if (state.fixedCosts[key]) state.fixedCosts[key] = state.fixedCosts[key].filter(r => r.id !== id);
  save(); render();
}

function addFixedRow(key, group) {
  if (!state.fixedCosts[key]) state.fixedCosts[key] = getMonthFixed(state.currentYear, state.currentMonth);
  state.fixedCosts[key].push({ id: uid(), group, label: 'Ny post', amount: 0 });
  save(); render();
}

        <span></span>
      </div>
      ${cats.map(cat => {
        const b = budgets[cat] || 0;
        const s = spent[cat] || 0;
        const left = b - s;
        const pct = b > 0 ? Math.round((s/b)*100) : null;
        const overBudget = b > 0 && s > b;
        const isCustom = (state.customCategories||[]).some(c => c.name === cat);
        return `
        <div style="display:grid;grid-template-columns:1fr 120px 100px 100px 70px 28px;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03)">
          <div style="display:flex;align-items:center;gap:8px">
            <span class="dot" style="background:${getCatColor(cat)}"></span>
            <span style="font-size:0.85rem">${cat}</span>
          </div>
          <input type="number" value="${b||''}" placeholder="0" style="width:100%"
            onchange="updateBudget('${key}','${cat}',this.value)">
          <div style="text-align:right;font-size:0.85rem;color:${s>0?'var(--text)':'var(--text3)'}">${s > 0 ? fmtMoney(s) : '–'}</div>
          <div style="text-align:right;font-size:0.85rem;color:${b>0?(overBudget?'var(--red)':'var(--green)'):'var(--text3)'}">
            ${b > 0 ? (overBudget ? '−' : '') + fmtMoney(Math.abs(left)) : '–'}
          </div>
          <div>
            ${pct !== null ? `<div style="font-size:0.78rem;color:${pct>100?'var(--red)':pct>80?'var(--orange)':'var(--text2)'};font-weight:600">${pct}%</div>
            <div class="prog-wrap" style="margin-top:3px"><div class="prog-fill ${pct>100?'red':pct>80?'orange':'green'}" style="width:${Math.min(100,pct)}%"></div></div>` : '<span style="color:var(--text3);font-size:0.78rem">–</span>'}
          </div>
          <button class="btn btn-danger btn-sm btn-icon" title="${isCustom?'Ta bort':'Dölj'}"
            onclick="removeCategory('${cat}')">✕</button>
        </div>`;
      }).join('')}
    </div>`).join('')}

  <div class="card" style="border-style:dashed;cursor:pointer;text-align:center" onclick="openAddCategoryModal('')">
    <span style="color:var(--text3);font-size:0.85rem">+ Ny kategori i ny grupp</span>
  </div>
</div>`;
}

function removeCategory(cat) {
  const isCustom = (state.customCategories||[]).some(c => c.name === cat);
  const msg = isCustom
    ? `Ta bort kategorin "${cat}"? Transaktioner med denna kategori behålls men kategorin försvinner.`
    : `Dölj standardkategorin "${cat}"? Den försvinner från listan men kan återställas i Inställningar.`;
  if (!confirm(msg)) return;
  if (isCustom) {
    state.customCategories = state.customCategories.filter(c => c.name !== cat);
  } else {
    if (!state.removedCategories) state.removedCategories = [];
    if (!state.removedCategories.includes(cat)) state.removedCategories.push(cat);
  }
  save(); render();
}

function openAddCategoryModal(defaultGroup) {

  const colorDots = palette.map(c => `<span onclick="document.getElementById('newCatColor').value='${c}';document.querySelectorAll('.color-pick').forEach(x=>x.style.outline='none');this.style.outline='2px solid white'" class="color-pick" style="display:inline-block;width:20px;height:20px;border-radius:50%;background:${c};cursor:pointer;margin:2px"></span>`).join('');
  openModal(`
    <div class="modal-title">Lägg till kategori</div>
    <div class="form-group">

    <div class="form-group">
      <label>Färg</label>
      <div style="margin-bottom:6px">${colorDots}</div>
      <input type="color" id="newCatColor" value="#4caf82" style="width:60px;height:30px;cursor:pointer">
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Avbryt</button>
      <button class="btn btn-gold" onclick="addCategory()">Lägg till</button>

function addCategory() {
  const name = document.getElementById('newCatName')?.value?.trim();
  const groupSel = document.getElementById('newCatGroup')?.value;
  const newGroupName = document.getElementById('newCatGroupName')?.value?.trim();
  const color = document.getElementById('newCatColor')?.value || '#4caf82';
  const group = groupSel === '__new__' ? (newGroupName || 'Övrigt') : groupSel;
  if (!name) { alert('Ange ett namn för kategorin'); return; }
  if (getAllCategories().includes(name)) { alert(`Kategorin "${name}" finns redan`); return; }
  if (!state.customCategories) state.customCategories = [];
  state.customCategories.push({ name, color, group });
  save(); closeModal(); render();
}


function updateBudget(key, cat, value) {
  if (!state.budgets[key]) state.budgets[key] = {};
  state.budgets[key][cat] = parseNum(value);
  save();
}

function saveGoal(editId) {
  const name = document.getElementById('g_name').value;
  const target = parseNum(document.getElementById('g_target').value);
  const saved = parseNum(document.getElementById('g_saved').value);
  const monthlyTarget = parseNum(document.getElementById('g_monthly').value);
  const deadline = document.getElementById('g_deadline').value;
  const color = document.getElementById('g_color').value;
  if (!name || !target) return;
  if (editId) {
    const idx = state.goals.findIndex(g => g.id === editId);
    if (idx >= 0) state.goals[idx] = { ...state.goals[idx], name, target, saved, monthlyTarget, deadline, color };
  } else {
    state.goals.push({ id: uid(), name, target, saved, monthlyTarget, deadline, color });
  }
  save(); closeModal(); render();
}

  state.goals = state.goals.filter(g => g.id !== id);
  save(); render();
}

function updateGoalSaved(id, v) {
  const idx = state.goals.findIndex(g => g.id === id);
  if (idx >= 0) state.goals[idx].saved = parseNum(v);
  save(); render();
}

function updateGoalMonthly(id, v) {
  const idx = state.goals.findIndex(g => g.id === id);
  if (idx >= 0) state.goals[idx].monthlyTarget = parseNum(v);
  save();
}

function renderAnnual() {
  const year = state.currentYear;
  const rows = [
    { label: 'Inkomst', key: 'income', color: 'var(--green)' },
    { label: 'Fasta', key: 'fixed', color: 'var(--text2)' },
    { label: 'Rörligt', key: 'flexible', color: 'var(--orange)' },
    { label: 'Resultat', key: 'result', color: 'var(--gold)', bold: true },
    { label: 'Buffert', key: 'buffer', color: 'var(--blue)' },
  ];

  const data = {};
  rows.forEach(r => { data[r.key] = []; });

  let cumBuffer = getBuffer();
  for (let m = 0; m < 12; m++) {
    const income = getTotalIncome(year, m);
    const fixed = getTotalFixed(year, m);
    const flex = getTotalFlexible(year, m);
    const result = income - fixed - flex;
    cumBuffer = Math.max(0, cumBuffer + result);
    data.income.push(income);
    data.fixed.push(fixed);
    data.flexible.push(flex);
    data.result.push(result);
    data.buffer.push(cumBuffer);
  }

  const planned = state.plannedExpenses.filter(p => p.year === year);
  const totals = {
    income: data.income.reduce((s,v)=>s+v,0),
    fixed: data.fixed.reduce((s,v)=>s+v,0),
    flexible: data.flexible.reduce((s,v)=>s+v,0),
    result: data.result.reduce((s,v)=>s+v,0),
  };

  return `
<div style="display:flex;flex-direction:column;gap:16px">
  <div class="section-header">
    <div class="section-title">Årsöversikt ${year}</div>
  </div>

  <div class="card">
    <div style="overflow-x:auto">
      <!-- Header -->
      <div class="annual-row" style="margin-bottom:8px">
        <div style="font-size:0.72rem;color:var(--text3)">Post</div>
        ${SHORT_MONTHS.map(mn => `<div class="annual-cell header">${mn}</div>`).join('')}
      </div>
      ${rows.map(row => `
      <div class="annual-row" style="margin-bottom:${row.bold?'8px':'2px'}">
        <div style="font-size:0.78rem;color:${row.color};white-space:nowrap;font-weight:${row.bold?700:400}">${row.label}</div>
        ${data[row.key].map((v, mi) => `
        <div class="annual-cell ${row.key==='result'?(v>=0?'pos':'neg'):''} ${mi===state.currentMonth?'highlight':''}"
          style="color:${row.key==='result'?(v>=0?'var(--green)':'var(--red)'):row.color}">
          ${row.key==='buffer' ? (v > 0 ? (v/1000).toFixed(0)+'k' : '–') : (v!==0 ? (Math.abs(v)/1000).toFixed(0)+'k' : '–')}
        </div>`).join('')}
      </div>
      ${row.bold ? `<div style="border-top:1px solid var(--border);margin:6px 0"></div>` : ''}`).join('')}

      <!-- Annual totals -->
      <div class="annual-row" style="margin-top:8px">
        <div style="font-size:0.78rem;color:var(--text3)">Årstotalt</div>
        ${SHORT_MONTHS.map((_,mi) => `<div class="annual-cell ${mi===state.currentMonth?'highlight':''}"></div>`).join('')}
      </div>
    </div>
    <div style="margin-top:16px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
      <div class="card" style="background:var(--bg3)">
        <div class="kpi-label">Årets inkomst</div>
        <div style="font-weight:700;font-size:1.1rem;color:var(--green)">${fmtMoney(totals.income)}</div>
      </div>
      <div class="card" style="background:var(--bg3)">
        <div class="kpi-label">Årets fasta</div>
        <div style="font-weight:700;font-size:1.1rem">${fmtMoney(totals.fixed)}</div>
      </div>
      <div class="card" style="background:var(--bg3)">
        <div class="kpi-label">Årets rörliga</div>
        <div style="font-weight:700;font-size:1.1rem">${fmtMoney(totals.flexible)}</div>
      </div>
      <div class="card" style="background:var(--bg3)">
        <div class="kpi-label">Årets resultat</div>
        <div style="font-weight:700;font-size:1.1rem;color:${totals.result>=0?'var(--green)':'var(--red)'}">${fmtMoney(totals.result, true)}</div>
      </div>
    </div>
  </div>

  ${planned.length > 0 ? `
  <div class="card">
    <div class="card-title">Planerade utgifter ${year}</div>
    <div style="display:flex;flex-direction:column;gap:6px">
      ${planned.map(p => `
      <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:0.85rem">
        <span><span class="dot" style="background:${getCatColor(p.category)}"></span> ${p.name}</span>
        <span style="color:var(--text3)">${MONTHS_SV[p.month]}</span>
        <span class="amount-neg">${fmtMoney(p.amount)}</span>
      </div>`).join('')}
    </div>
  </div>` : ''}
</div>`;
}

// ============================================================
// ANALYSIS
// ============================================================
function renderAnalysis(y, m) {
  const spent = getSpentByCategory(y, m);
  const totalIncome = getTotalIncome(y, m);
  const totalFixed = getTotalFixed(y, m);
  const totalFlex = getTotalFlexible(y, m);

  // 6-month trend
  const trend = [];
  for (let i = 5; i >= 0; i--) {
    let tm = m - i, ty = y;
    if (tm < 0) { tm += 12; ty--; }
    trend.push({
      label: SHORT_MONTHS[tm],
      income: getTotalIncome(ty, tm),
      fixed: getTotalFixed(ty, tm),
      flex: getTotalFlexible(ty, tm),
      result: getTotalIncome(ty, tm) - getTotalFixed(ty, tm) - getTotalFlexible(ty, tm)
    });
  }

  const maxTrend = Math.max(...trend.map(t => Math.max(t.income, t.fixed + t.flex)));

  // Top categories
  const topCats = Object.entries(spent).sort((a,b) => b[1]-a[1]).slice(0, 10);

  // Per person
  const albinSpent = state.transactions
    .filter(tx => { const eff = tx.ccType ? getCCEffectiveMonth(tx.date, tx.ccType) : null;
      const d = new Date(tx.date);
      return (eff ? eff.year===y && eff.month===m : d.getFullYear()===y && d.getMonth()===m) && tx.person==='Albin'; })
    .reduce((s,t) => s+t.amount, 0);
  const dianaSpent = state.transactions
    .filter(tx => { const eff = tx.ccType ? getCCEffectiveMonth(tx.date, tx.ccType) : null;
      const d = new Date(tx.date);
      return (eff ? eff.year===y && eff.month===m : d.getFullYear()===y && d.getMonth()===m) && tx.person==='Diana'; })
    .reduce((s,t) => s+t.amount, 0);
  const sharedSpent = totalFlex - albinSpent - dianaSpent;

  return `
<div style="display:flex;flex-direction:column;gap:16px">
  <div class="section-title" style="margin-bottom:4px">Analys – ${MONTHS_SV[m]} ${y}</div>

  <!-- Summary donut-style KPIs -->
  <div class="grid-3">
    <div class="card" style="text-align:center">
      <div class="kpi-label">Fasta / Inkomst</div>
      <div class="kpi-val">${totalIncome > 0 ? Math.round((totalFixed/totalIncome)*100) : 0}%</div>
      <div class="kpi-sub">${fmtMoney(totalFixed)} av ${fmtMoney(totalIncome)}</div>
    </div>
    <div class="card" style="text-align:center">
      <div class="kpi-label">Rörligt / Inkomst</div>

        const incH = maxTrend > 0 ? (t.income / maxTrend) * 90 : 0;

        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">

            <div style="width:8px;height:${fixH+flxH}px;background:linear-gradient(to top,var(--text3) ${(fixH/(fixH+flxH||1))*100}%,var(--orange) 0%);border-radius:2px 2px 0 0" title="Fasta+Rörligt: ${fmtMoney(t.fixed+t.flex)}"></div>
          </div>
          <div style="font-size:0.7rem;color:var(--text3)">${t.label}</div>
          <div style="font-size:0.7rem;color:${t.result>=0?'var(--green)':'var(--red)'};font-weight:600">${t.result>=0?'+':''}${(t.result/1000).toFixed(0)}k</div>

    <div style="display:flex;gap:16px;font-size:0.75rem;color:var(--text3)">
      <span><span style="display:inline-block;width:8px;height:8px;background:var(--green);border-radius:2px;margin-right:4px"></span>Inkomst</span>
      <span><span style="display:inline-block;width:8px;height:8px;background:var(--text3);border-radius:2px;margin-right:4px"></span>Fasta</span>
      <span><span style="display:inline-block;width:8px;height:8px;background:var(--orange);border-radius:2px;margin-right:4px"></span>Rörliga</span>

  </div>

  <div class="grid-2">
    <!-- Top categories -->
    <div class="card">
      <div class="card-title">Topp kategorier denna månad</div>
      ${topCats.length === 0 ? `<div style="color:var(--text3);font-size:0.85rem">Inga utgifter ännu.</div>` : `
      <div class="bar-chart">
        ${topCats.map(([cat, amt]) => {
          const pct = totalFlex > 0 ? (amt / totalFlex) * 100 : 0;
          return `
          <div class="bar-row">
            <div class="bar-label">${cat}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${getCatColor(cat)}"></div></div>
            <div class="bar-val">${fmtMoney(amt)}</div>
          </div>`;
        }).join('')}

    </div>

    <!-- Per person -->
    <div class="card">
      <div class="card-title">Per person – rörliga utgifter</div>
      ${[['Albin',albinSpent,'var(--blue)'],['Diana',dianaSpent,'var(--purple)'],['Gemensamt',sharedSpent,'var(--gold)']].map(([name,amt,color]) => `
      <div style="margin-bottom:12px">

}

function updateCC(person, field, value) {
  if (!state.settings[person+'CC']) state.settings[person+'CC'] = {};
  state.settings[person+'CC'][field] = parseInt(value) || 1;
  save();
}

function updateSetting(key, value) {
  state.settings[key] = parseNum(value);
  save();
}

function addTaxRefund() {
  if (!state.settings.taxRefunds) state.settings.taxRefunds = [];
  const now = new Date();
  state.settings.taxRefunds.push({ year: now.getFullYear(), month: 5, expected: 0, actual: 0 });
  save(); render();
}

function removeTaxRefund(i) {
  state.settings.taxRefunds.splice(i, 1);
  save(); render();
}

function updateTaxRefund(i, field, value) {
  state.settings.taxRefunds[i][field] = field === 'month' || field === 'year' ? parseInt(value) : parseNum(value);
  save();
}

async function saveSyncSettings() {
  const apiKey = document.getElementById('syncApiKeyInput')?.value?.trim();
  const binId = document.getElementById('syncBinIdInput')?.value?.trim();
  if (!apiKey) { alert('Ange din API-nyckel från JSONBin.io'); return; }

  syncCfg.apiKey = apiKey;

  if (!binId) {
    // Create a new bin
    try {
      const newId = await createNewBin(apiKey);
      if (!newId) { alert('Kunde inte skapa databas. Kontrollera API-nyckeln.'); return; }
      syncCfg.binId = newId;
      alert(`✅ Databas skapad!\n\nBin ID: ${newId}\n\nKopiera och spara detta ID — du behöver det om du loggar in på JSONBin.io. Diana behöver inte göra något, appen synkar automatiskt.`);
    } catch(e) {
      alert(`Fel: ${e.message}`);
      return;
    }
  } else {
    syncCfg.binId = binId;
  }

  syncCfg.enabled = true;
  saveSyncCfg();
  setSyncStatus('syncing', 'Ansluter…');
  await pushToCloud();
  startPolling();
  render();
}

async function forcePull() {
  await pullFromCloud(false);
  render();
}

async function forcePush() {
  clearTimeout(saveDebounceTimer);
  await pushToCloud();
}

function disableSync() {
  if (!confirm('Inaktivera molnsynk? Data finns kvar lokalt och på JSONBin.io.')) return;
  syncCfg.enabled = false;
  clearInterval(pollTimer);
  saveSyncCfg();
  setSyncStatus('unconfigured', 'Ej aktiv');
  render();
}

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = `budget-zambuhre-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
}

function importData() {
  const area = document.getElementById('importArea');
  const btn = document.getElementById('importBtn');
  area.style.display = area.style.display === 'none' ? 'block' : 'none';
  btn.style.display = btn.style.display === 'none' ? 'block' : 'none';
}

function doImport() {
  try {
    const data = JSON.parse(document.getElementById('importArea').value);
    Object.assign(state, data);
    initDefaults();
    save(); render();
  } catch(e) { alert('Ogiltig data. Kontrollera formatet.'); }
}

function clearData() {
  localStorage.removeItem('bz_v2');
  location.reload();
}

  document.getElementById('modalBody').innerHTML = body;

// ============================================================
// DONUT CHART DRAWING
// ============================================================
function drawDonut(canvasId, segments) {
  // segments: [{value, color}]
  setTimeout(() => {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const cx = 60, cy = 60, r = 48, inner = 30;
    const total = segments.reduce((s, seg) => s + seg.value, 0);
    if (total <= 0) {
      ctx.clearRect(0, 0, 120, 120);
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
      ctx.strokeStyle = '#2a2e38'; ctx.lineWidth = 18; ctx.stroke();
      return;
    }
    ctx.clearRect(0, 0, 120, 120);
    let start = -Math.PI / 2;
    segments.forEach(seg => {
      if (seg.value <= 0) return;
      const angle = (seg.value / total) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, start, start + angle);
      ctx.closePath();
      ctx.fillStyle = seg.color;
      ctx.fill();
      start += angle;
    });
    // Punch inner hole
    ctx.beginPath(); ctx.arc(cx, cy, inner, 0, Math.PI*2);
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--bg2').trim() || '#13151a';
    ctx.fill();
  }, 0);
}
